# TextBox — Text input field (child of GUI container)
# Bevy: Node + Interaction + Text + TextBoxMarker

[gui]
visible = true
background_color = [255, 255, 255]
background_transparency = 0.0
border_color = [27, 27, 27]
border_size_pixel = 1
border_mode = "Outline"
clips_descendants = true
z_index = 1
layout_order = 0
rotation = 0.0
anchor_point = [0.0, 0.0]
position_scale = [0.0, 0.0]
position_offset = [0.0, 0.0]
size_scale = [0.0, 0.0]
size_offset = [100.0, 30.0]
automatic_size = "None"
active = true

[text]
text = ""
placeholder_text = ""
placeholder_color = [178, 178, 178]
text_color = [0, 0, 0]
text_transparency = 0.0
text_stroke_color = [0, 0, 0]
text_stroke_transparency = 1.0
font_size = 14.0
font = "GothamSsm"
text_scaled = false
text_wrapped = false
text_x_alignment = "Left"
text_y_alignment = "Center"
rich_text = false
line_height = 1.0
clear_text_on_focus = false
multi_line = false

[metadata]
class_name = "TextBox"
archivable = true
