# ScrollingFrame — Scrollable container (child of GUI container)
# Bevy: Node with overflow scroll

[gui]
visible = true
background_color = [255, 255, 255]
background_transparency = 0.0
border_color = [27, 27, 27]
border_size_pixel = 1
border_mode = "Outline"
clips_descendants = true
z_index = 1
layout_order = 0
rotation = 0.0
anchor_point = [0.0, 0.0]
position_scale = [0.0, 0.0]
position_offset = [0.0, 0.0]
size_scale = [0.0, 0.0]
size_offset = [200.0, 150.0]
automatic_size = "None"
active = true

[scrolling]
scrolling_enabled = true
scroll_bar_thickness = 12
canvas_size = [0.0, 0.0]
scrolling_direction = "XY"
scroll_bar_image_color = [76, 76, 76]
scroll_bar_image_transparency = 0.0
elastic_behavior = "Always"
top_image = ""
mid_image = ""
bottom_image = ""

[metadata]
class_name = "ScrollingFrame"
archivable = true
