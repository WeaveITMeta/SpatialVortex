# Skybox — Cubemap-based sky rendering using six face textures
# Auto-created with each Space in Lighting/ folder.
# .instance.toml extension causes the file loader to spawn this as an ECS entity.

[metadata]
class_name = "Sky"
archivable = true

[Textures]
FrontTextureId = { type = "string", value = "", description = "Front face cubemap texture asset ID" }
BackTextureId = { type = "string", value = "", description = "Back face cubemap texture asset ID" }
LeftTextureId = { type = "string", value = "", description = "Left face cubemap texture asset ID" }
RightTextureId = { type = "string", value = "", description = "Right face cubemap texture asset ID" }
TopTextureId = { type = "string", value = "", description = "Top face cubemap texture asset ID" }
BottomTextureId = { type = "string", value = "", description = "Bottom face cubemap texture asset ID" }

[Appearance]
Color = { type = "Color3", value = [1.0, 1.0, 1.0], description = "Tint color applied to all faces" }
Brightness = { type = "float", value = 1.0, min = 0.0, max = 5.0, description = "Skybox brightness multiplier" }
Rotation = { type = "float", value = 0.0, min = 0.0, max = 360.0, description = "Y-axis rotation in degrees" }
AutoRotate = { type = "bool", value = false, description = "Continuously rotate the skybox" }
RotationSpeed = { type = "float", value = 1.0, min = -10.0, max = 10.0, description = "Auto-rotation speed in degrees per second" }

[Blending]
BlendMode = { type = "enum", value = "Replace", options = ["Replace", "Additive", "Multiply"], description = "How skybox blends with the scene" }
BlendFactor = { type = "float", value = 1.0, min = 0.0, max = 1.0, description = "Blend strength (1 = fully skybox)" }
Preset = { type = "enum", value = "None", options = ["None", "Day", "Night", "Sunset", "Overcast", "Space"], description = "Quick-apply preset" }

[Advanced]
HDR = { type = "bool", value = false, description = "Use HDR rendering for this skybox" }
HDRExposure = { type = "float", value = 1.0, min = 0.1, max = 10.0, description = "HDR exposure value" }
MipmapQuality = { type = "enum", value = "High", options = ["Low", "Medium", "High", "Ultra"], description = "Cubemap mipmap filter quality" }
Distance = { type = "float", value = 10000.0, min = 100.0, description = "Skybox sphere render distance" }
