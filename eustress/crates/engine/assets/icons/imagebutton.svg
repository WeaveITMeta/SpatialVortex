<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none">
  <!-- Button border with rounded corners -->
  <rect x="1.5" y="2.5" width="13" height="11" rx="2" stroke="#4fc1ff" stroke-width="1.2" fill="none"/>
  <!-- Image background fill -->
  <rect x="3" y="4" width="10" height="7" rx="0.5" fill="#4fc1ff" fill-opacity="0.1"/>
  <!-- Mountain/image content -->
  <path d="M3 10.5 L6 7 L8.5 9 L10.5 7.5 L13 10.5 Z" fill="#4fc1ff" fill-opacity="0.3"/>
  <!-- Sun -->
  <circle cx="11" cy="5.5" r="1.1" fill="#4fc1ff" fill-opacity="0.65"/>
  <!-- Bottom press indicator bar -->
  <rect x="3" y="11.5" width="10" height="1.2" rx="0.6" fill="#4fc1ff" fill-opacity="0.5"/>
</svg>
