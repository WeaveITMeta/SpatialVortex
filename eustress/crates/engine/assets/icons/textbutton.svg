<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none">
  <!-- Button with rounded corners and depth shadow -->
  <rect x="1.5" y="4.5" width="13" height="8" rx="2" fill="#4fc1ff" fill-opacity="0.2" stroke="#4fc1ff" stroke-width="1.2"/>
  <!-- Bottom edge highlight for depth -->
  <rect x="1.5" y="10.5" width="13" height="2" rx="0 0 2 2" fill="#4fc1ff" fill-opacity="0.25"/>
  <!-- Text line -->
  <line x1="4" y1="8.5" x2="12" y2="8.5" stroke="#4fc1ff" stroke-width="1.3" stroke-linecap="round"/>
</svg>
