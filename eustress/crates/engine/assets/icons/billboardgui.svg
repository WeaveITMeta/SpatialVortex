<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none">
  <!-- 3D box (part) at bottom -->
  <path d="M4 11 L8 9 L12 11 L12 14 L8 12 L4 14 Z" fill="#4fc1ff" fill-opacity="0.15" stroke="#4fc1ff" stroke-width="0.9" stroke-linejoin="round"/>
  <line x1="8" y1="9" x2="8" y2="12" stroke="#4fc1ff" stroke-width="0.9"/>
  <!-- Stem connecting billboard to part -->
  <line x1="8" y1="4" x2="8" y2="9" stroke="#4fc1ff" stroke-width="0.9" stroke-dasharray="1.2 1"/>
  <!-- Billboard panel floating above -->
  <rect x="2.5" y="1.5" width="11" height="6" rx="1" stroke="#4fc1ff" stroke-width="1.2" fill="#4fc1ff" fill-opacity="0.12"/>
  <!-- Text line inside billboard -->
  <line x1="4.5" y1="3.5" x2="11.5" y2="3.5" stroke="#4fc1ff" stroke-width="1" stroke-linecap="round"/>
  <line x1="4.5" y1="5.5" x2="9" y2="5.5" stroke="#4fc1ff" stroke-width="1" stroke-linecap="round"/>
</svg>
