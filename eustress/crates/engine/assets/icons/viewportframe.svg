  <rect x="1.5" y="1.5" width="13" height="13" rx="1.5" stroke="#4fc1ff" stroke-width="1.2" fill="none"/>
  <!-- Inner viewport area -->
  <rect x="3" y="3" width="10" height="10" rx="0.5" fill="#4fc1ff" fill-opacity="0.06"/>
  <!-- 3D cube inside viewport -->
  <!-- Front face -->
