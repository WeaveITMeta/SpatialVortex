  <!-- Right face -->
  <path d="M10 6.5 L12 4.5 L12 9 L10 11 Z" fill="#4fc1ff" fill-opacity="0.15" stroke="#4fc1ff" stroke-width="0.8" stroke-linejoin="round"/>
