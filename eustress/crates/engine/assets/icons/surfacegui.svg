<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none">
  <!-- 3D block face (front face of a part) -->
  <path d="M2 5 L8 2.5 L14 5 L14 13 L8 13 L2 13 Z" fill="#4fc1ff" fill-opacity="0.1" stroke="#4fc1ff" stroke-width="1.1" stroke-linejoin="round"/>
