<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none">
  <!-- Gear body -->
  <circle cx="8" cy="8" r="2.2" stroke="#a0a0c0" stroke-width="1.1" fill="none"/>
  <!-- Gear teeth (8 teeth via path) -->
  <path d="M8 1.5 L8.7 3.2 L7.3 3.2 Z
           M8 14.5 L8.7 12.8 L7.3 12.8 Z
           M1.5 8 L3.2 7.3 L3.2 8.7 Z
           M14.5 8 L12.8 7.3 L12.8 8.7 Z
           M3.4 3.4 L4.7 4.7 L3.7 5.7 Z
           M12.6 12.6 L11.3 11.3 L12.3 10.3 Z
           M12.6 3.4 L11.3 4.7 L12.3 5.7 Z
           M3.4 12.6 L4.7 11.3 L3.7 10.3 Z"
        fill="#a0a0c0"/>
  <!-- Chart bars inside gear to suggest simulation output -->
  <rect x="6.2" y="7.5" width="1" height="1.8" fill="#a0a0c0" rx="0.2"/>
  <rect x="7.5" y="6.5" width="1" height="2.8" fill="#a0a0c0" rx="0.2"/>
</svg>
