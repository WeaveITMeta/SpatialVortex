<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none">
  <!-- Monitor outline -->
  <rect x="1" y="2" width="14" height="10" rx="1.5" stroke="#4fc1ff" stroke-width="1.2" fill="none"/>
  <!-- Screen inner area highlight -->
  <rect x="3" y="4" width="10" height="6" rx="0.5" fill="#4fc1ff" fill-opacity="0.15"/>
  <!-- Stand stem -->
  <line x1="8" y1="12" x2="8" y2="14" stroke="#4fc1ff" stroke-width="1.2"/>
  <!-- Stand base -->
  <line x1="5.5" y1="14" x2="10.5" y2="14" stroke="#4fc1ff" stroke-width="1.2" stroke-linecap="round"/>
  <!-- UI grid lines inside screen -->
  <line x1="3" y1="6.5" x2="13" y2="6.5" stroke="#4fc1ff" stroke-width="0.6" stroke-opacity="0.6"/>
  <line x1="7" y1="4" x2="7" y2="10" stroke="#4fc1ff" stroke-width="0.6" stroke-opacity="0.6"/>
</svg>