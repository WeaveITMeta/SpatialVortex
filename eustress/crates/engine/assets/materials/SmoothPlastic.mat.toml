# SmoothPlastic — polished plastic with lower roughness than Plastic
# Slight glossy sheen, zero metallic

[material]
name = "SmoothPlastic"
description = "Polished smooth plastic surface"
tags = ["plastic", "smooth", "glossy"]

[pbr]
base_color = [1.0, 1.0, 1.0, 1.0]
metallic = 0.0
roughness = 0.2
reflectance = 0.5
