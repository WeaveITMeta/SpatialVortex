# Ice — frozen water crystal
# Very low roughness, slight blue tint, subtle transmission

[material]
name = "Ice"
description = "Frozen water with crystalline clarity"
tags = ["ice", "frozen", "crystal", "cold"]

[pbr]
base_color = [0.85, 0.92, 0.98, 0.85]
metallic = 0.0
roughness = 0.05
reflectance = 0.7
alpha_mode = "Blend"
specular_transmission = 0.6
diffuse_transmission = 0.2
thickness = 0.3
ior = 1.31

[physics]
melting_point = 273.0
yield_strength = 1.0e6
thermal_conductivity = 2.2
specific_heat = 2090.0

[reactive]
# Ice melts to water at 273K — transparency increases, roughness drops
temperature_color_gradient = [
    { threshold = 200.0, color = [0.85, 0.92, 0.98, 0.85] },
    { threshold = 270.0, color = [0.80, 0.90, 0.98, 0.70] },
    { threshold = 273.0, color = [0.70, 0.85, 0.95, 0.30] },
]
