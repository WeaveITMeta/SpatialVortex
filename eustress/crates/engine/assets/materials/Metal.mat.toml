# Metal — standard polished metal
# High metallic, low roughness, strong reflections

[material]
name = "Metal"
description = "Polished bare metal surface"
tags = ["metal", "polished", "reflective"]

[pbr]
base_color = [0.8, 0.8, 0.82, 1.0]
metallic = 0.9
roughness = 0.3
reflectance = 0.8

[textures]
