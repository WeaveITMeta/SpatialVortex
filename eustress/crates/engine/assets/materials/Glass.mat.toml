# Glass — transparent glass pane
# Near-zero roughness, high transmission, IOR 1.5

[material]
name = "Glass"
description = "Transparent glass with realistic refraction"
tags = ["glass", "transparent", "window"]

[pbr]
base_color = [1.0, 1.0, 1.0, 0.15]
metallic = 0.0
roughness = 0.0
reflectance = 0.5
alpha_mode = "Blend"
specular_transmission = 0.9
diffuse_transmission = 0.3
thickness = 0.5
ior = 1.5

[physics]
melting_point = 1773.0
yield_strength = 33.0e6
thermal_conductivity = 1.05
specific_heat = 840.0

[reactive]
# Glass softens around 873K (annealing point), flows at melting point
temperature_color_gradient = [
    { threshold = 600.0, color = [1.0, 1.0, 1.0, 0.15] },
    { threshold = 873.0, color = [1.0, 0.85, 0.7, 0.3] },
    { threshold = 1473.0, color = [1.0, 0.6, 0.2, 0.5] },
    { threshold = 1773.0, color = [1.0, 0.8, 0.4, 0.7] },
]
temperature_emissive_start = 873.0
